<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Straitgate Schools</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <h1>Redirecting...</h1>
    <p>If you are not redirected, <a href="https://straitgate-schools.vercel.app">click here</a>.</p>
    <script>
      // Handle Identity confirmation tokens (invite, recovery, email change)
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function(user) {
          if (!user) {
            window.netlifyIdentity.on("login", function() {
              document.location.href = "https://straitgate-schools.vercel.app/admin/";
            });
          }
        });
      }
      // If no hash token, redirect to main site
      if (!window.location.hash) {
        window.location.href = "https://straitgate-schools.vercel.app";
      }
    </script>
  </body>
</html>
